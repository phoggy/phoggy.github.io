<button id="theme-toggle" class="btn">☀️ Light</button>

<script>
(function () {
  function _themeLink() {
    return document.querySelector('link[href*="just-the-docs-"]');
  }

  function _sync() {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    var link = _themeLink();
    var isLight = link && /just-the-docs-light\.css/.test(link.getAttribute('href'));
    btn.textContent = isLight ? '🌙 Dark' : '☀️ Light';
  }

  function _init() {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;

    btn.addEventListener('click', function () {
      var link = _themeLink();
      if (!link) return;
      var href = link.getAttribute('href');
      var goLight = !/just-the-docs-light\.css/.test(href);
      link.setAttribute('href', goLight
        ? href.replace(/just-the-docs-\w+\.css/, 'just-the-docs-light.css')
        : href.replace('just-the-docs-light.css', 'just-the-docs-default.css'));
      localStorage.setItem('rayvn-color-scheme', goLight ? 'light' : 'dark');
      _sync();
    });

    _sync();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', _init);
  } else {
    _init();
  }
})();
</script>
